<!DOCTYPE html>
<html>

<head>
<title>Book Store</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
    margin:0;
}

/* Header */

.header{
    background:#333;
    color:white;
    padding:20px;
    text-align:center;
}

/* Navigation */

.nav{
    margin-top:10px;
}

.nav a{
    color:white;
    margin:10px;
    text-decoration:none;
    font-size:16px;
}

.nav a:hover{
    text-decoration:underline;
}

/* Search Bar */

.search{
margin-top:15px;
}

.search input{
padding:8px;
width:220px;
border-radius:5px;
border:none;
}

.search button{
padding:8px 15px;
border:none;
background:#2196f3;
color:white;
border-radius:5px;
cursor:pointer;
}

/* Container */

.container{
    width:90%;
    margin:auto;
}

/* Books Layout */

.books{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
    margin-top:40px;
}

/* Book Card */

.book{
    width:220px;
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0px 0px 8px gray;
    text-align:center;
    transition:0.3s;
}

.book:hover{
    transform:scale(1.05);
}

/* Book Image */

.book img{
    width:120px;
    height:160px;
}

/* Price */

.price{
    color:green;
    font-weight:bold;
    font-size:18px;
}

/* Rating */

.rating{
    color:orange;
    margin:5px;
}

/* Discount */

.discount{
    color:red;
    font-weight:bold;
}

/* Buttons */

.cart{
    margin-top:8px;
    padding:8px 15px;
    border:none;
    background:#4CAF50;
    color:white;
    border-radius:5px;
    cursor:pointer;
    margin-right:5px;
}

.buy{
    margin-top:8px;
    padding:8px 15px;
    border:none;
    background:#2196f3;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

/* Footer */

.footer{
    margin-top:50px;
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
}

</style>

</head>

<body>

<div class="header">

<h1>📚 Book Store</h1>

<!-- NAVBAR -->

<div class="nav">
<a href="/">Home</a>
<a href="{% url 'cart' %}">Cart</a>
<a href="{% url 'about' %}">About</a>
<a href="{% url 'contact' %}">Contact</a>
</div>

<!-- SEARCH BAR -->

<div class="search">
<form method="GET" action="/">
<input type="text" name="q" placeholder="Search books...">
<button type="submit">Search</button>
</form>
</div>

</div>

<div class="container">

<div class="books">

{% for book in books %}

<div class="book">

<img src="{{ book.image.url }}">

<h3>{{ book.title }}</h3>

<p><b>Author:</b> {{ book.author }}</p>

<p class="price">₹{{ book.price }}</p>

<p class="rating">⭐⭐⭐⭐☆</p>

<p class="discount">20% OFF</p>

<a href="{% url 'add_to_cart' book.id %}">
<button class="cart">Add to Cart</button>
</a>

<a href="{% url 'buy_now' book.id %}">
<button class="buy">Buy Now</button>
</a>

</div>

{% endfor %}

</div>

</div>

<div class="footer">
<p>© 2026 Book Store | Designed by Asha</p>
</div>

</body>

</html>
