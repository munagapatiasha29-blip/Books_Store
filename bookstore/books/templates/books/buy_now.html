<!DOCTYPE html>
<html>

<head>
<title>Buy Book</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding-top:100px;
}

.box{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

.price{
color:green;
font-size:20px;
font-weight:bold;
}

button{
padding:10px 20px;
background:#2196f3;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>{{ book.title }}</h2>

<p><b>Author:</b> {{ book.author }}</p>

<p class="price">Price: ₹{{ book.price }}</p>
<a href = "{% url 'payment' %}">
<button>Proceed to Payment</button>
</a>
<br><br>

<a href="/">← Back to Store</a>

</div>

</body>

</html>
